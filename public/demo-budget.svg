<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="budgetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="category1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="category2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="category3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Browser Window -->
  <rect x="20" y="20" width="360" height="260" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  
  <!-- Browser Header -->
  <rect x="20" y="20" width="360" height="30" rx="12" fill="#F1F5F9"/>
  <circle cx="40" cy="35" r="5" fill="#EF4444"/>
  <circle cx="55" cy="35" r="5" fill="#F59E0B"/>
  <circle cx="70" cy="35" r="5" fill="#10B981"/>
  <rect x="90" y="30" width="200" height="10" rx="5" fill="#E2E8F0"/>
  
  <!-- Screen Content -->
  <rect x="30" y="60" width="340" height="210" rx="8" fill="url(#budgetGradient)"/>
  
  <!-- Header -->
  <rect x="40" y="70" width="100" height="15" rx="4" fill="#8B5CF6"/>
  <rect x="150" y="72" width="60" height="10" rx="3" fill="#E2E8F0"/>
  
  <!-- Add Budget Button -->
  <rect x="300" y="68" width="60" height="20" rx="10" fill="#8B5CF6"/>
  <text x="330" y="82" text-anchor="middle" fill="#FFF" font-size="8" font-weight="bold">+ Add</text>
  
  <!-- Budget Categories -->
  <rect x="40" y="100" width="320" height="50" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <circle cx="65" cy="125" r="15" fill="url(#category1)"/>
  <text x="65" y="130" text-anchor="middle" fill="#FFF" font-size="12">🍕</text>
  <rect x="90" y="115" width="80" height="10" rx="3" fill="#6366F1"/>
  <rect x="90" y="130" width="120" height="8" rx="2" fill="#94A3B8"/>
  <rect x="220" y="120" width="40" height="15" rx="4" fill="#10B981"/>
  <text x="240" y="131" text-anchor="middle" fill="#FFF" font-size="8" font-weight="bold">65%</text>
  
  <rect x="40" y="160" width="320" height="50" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <circle cx="65" cy="185" r="15" fill="url(#category2)"/>
  <text x="65" y="190" text-anchor="middle" fill="#FFF" font-size="12">🚗</text>
  <rect x="90" y="175" width="80" height="10" rx="3" fill="#6366F1"/>
  <rect x="90" y="190" width="120" height="8" rx="2" fill="#94A3B8"/>
  <rect x="220" y="180" width="40" height="15" rx="4" fill="#F59E0B"/>
  <text x="240" y="191" text-anchor="middle" fill="#FFF" font-size="8" font-weight="bold">45%</text>
  
  <rect x="40" y="220" width="320" height="50" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <circle cx="65" cy="245" r="15" fill="url(#category3)"/>
  <text x="65" y="250" text-anchor="middle" fill="#FFF" font-size="12">🛒</text>
  <rect x="90" y="235" width="80" height="10" rx="3" fill="#6366F1"/>
  <rect x="90" y="250" width="120" height="8" rx="2" fill="#94A3B8"/>
  <rect x="220" y="240" width="40" height="15" rx="4" fill="#EF4444"/>
  <text x="240" y="251" text-anchor="middle" fill="#FFF" font-size="8" font-weight="bold">80%</text>
</svg>
