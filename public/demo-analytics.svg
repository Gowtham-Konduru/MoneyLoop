<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="analyticsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Browser Window -->
  <rect x="20" y="20" width="360" height="260" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  
  <!-- Browser Header -->
  <rect x="20" y="20" width="360" height="30" rx="12" fill="#F1F5F9"/>
  <circle cx="40" cy="35" r="5" fill="#EF4444"/>
  <circle cx="55" cy="35" r="5" fill="#F59E0B"/>
  <circle cx="70" cy="35" r="5" fill="#10B981"/>
  <rect x="90" y="30" width="200" height="10" rx="5" fill="#E2E8F0"/>
  
  <!-- Screen Content -->
  <rect x="30" y="60" width="340" height="210" rx="8" fill="url(#analyticsGradient)"/>
  
  <!-- Header -->
  <rect x="40" y="70" width="120" height="15" rx="4" fill="#6366F1"/>
  <rect x="170" y="72" width="60" height="10" rx="3" fill="#E2E8F0"/>
  
  <!-- Time Filter -->
  <rect x="280" y="68" width="80" height="20" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="320" y="82" text-anchor="middle" fill="#6366F1" font-size="8" font-weight="bold">Monthly</text>
  
  <!-- Main Chart -->
  <rect x="40" y="100" width="320" height="100" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  
  <!-- Line Chart -->
  <path d="M50 170 L90 150 L130 160 L170 130 L210 140 L250 110 L290 120 L330 100 L350 90" stroke="url(#chartGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Area under chart -->
  <path d="M50 170 L90 150 L130 160 L170 130 L210 140 L250 110 L290 120 L330 100 L350 90 L350 190 L50 190 Z" fill="url(#chartGradient)" opacity="0.2"/>
  
  <!-- Chart Points -->
  <circle cx="50" cy="170" r="4" fill="#6366F1"/>
  <circle cx="90" cy="150" r="4" fill="#6366F1"/>
  <circle cx="130" cy="160" r="4" fill="#6366F1"/>
  <circle cx="170" cy="130" r="4" fill="#6366F1"/>
  <circle cx="210" cy="140" r="4" fill="#6366F1"/>
  <circle cx="250" cy="110" r="4" fill="#6366F1"/>
  <circle cx="290" cy="120" r="4" fill="#6366F1"/>
  <circle cx="330" cy="100" r="4" fill="#6366F1"/>
  <circle cx="350" cy="90" r="4" fill="#6366F1"/>
  
  <!-- Stats Cards -->
  <rect x="40" y="210" width="100" height="50" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="90" y="230" text-anchor="middle" fill="#6366F1" font-size="8" font-weight="bold">Total Spent</text>
  <text x="90" y="245" text-anchor="middle" fill="#1E293B" font-size="10" font-weight="bold">₹45,000</text>
  
  <rect x="150" y="210" width="100" height="50" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="200" y="230" text-anchor="middle" fill="#10B981" font-size="8" font-weight="bold">Saved</text>
  <text x="200" y="245" text-anchor="middle" fill="#1E293B" font-size="10" font-weight="bold">₹30,000</text>
  
  <rect x="260" y="210" width="100" height="50" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="310" y="230" text-anchor="middle" fill="#F59E0B" font-size="8" font-weight="bold">Budget Left</text>
  <text x="310" y="245" text-anchor="middle" fill="#1E293B" font-size="10" font-weight="bold">₹25,000</text>
</svg>
