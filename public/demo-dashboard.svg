<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Browser Window -->
  <rect x="20" y="20" width="360" height="260" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  
  <!-- Browser Header -->
  <rect x="20" y="20" width="360" height="30" rx="12" fill="#F1F5F9"/>
  <circle cx="40" cy="35" r="5" fill="#EF4444"/>
  <circle cx="55" cy="35" r="5" fill="#F59E0B"/>
  <circle cx="70" cy="35" r="5" fill="#10B981"/>
  <rect x="90" y="30" width="200" height="10" rx="5" fill="#E2E8F0"/>
  
  <!-- Screen Content -->
  <rect x="30" y="60" width="340" height="210" rx="8" fill="url(#screenGradient)"/>
  
  <!-- Header -->
  <rect x="40" y="70" width="80" height="15" rx="4" fill="#6366F1"/>
  <rect x="130" y="72" width="60" height="10" rx="3" fill="#E2E8F0"/>
  
  <!-- Stats Cards -->
  <rect x="40" y="95" width="100" height="60" rx="8" fill="url(#cardGradient1)"/>
  <text x="90" y="115" text-anchor="middle" fill="#FFF" font-size="10" font-weight="bold">Balance</text>
  <text x="90" y="135" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold">₹45,000</text>
  
  <rect x="150" y="95" width="100" height="60" rx="8" fill="url(#cardGradient2)"/>
  <text x="200" y="115" text-anchor="middle" fill="#FFF" font-size="10" font-weight="bold">Income</text>
  <text x="200" y="135" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold">₹75,000</text>
  
  <rect x="260" y="95" width="100" height="60" rx="8" fill="url(#cardGradient3)"/>
  <text x="310" y="115" text-anchor="middle" fill="#FFF" font-size="10" font-weight="bold">Expense</text>
  <text x="310" y="135" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold">₹30,000</text>
  
  <!-- Chart Area -->
  <rect x="40" y="165" width="150" height="90" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <rect x="50" y="200" width="20" height="40" fill="#6366F1" rx="2"/>
  <rect x="75" y="180" width="20" height="60" fill="#8B5CF6" rx="2"/>
  <rect x="100" y="190" width="20" height="50" fill="#10B981" rx="2"/>
  <rect x="125" y="170" width="20" height="70" fill="#F59E0B" rx="2"/>
  
  <!-- Transactions List -->
  <rect x="200" y="165" width="170" height="90" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <rect x="210" y="175" width="30" height="20" rx="4" fill="#E2E8F0"/>
  <rect x="250" y="180" width="100" height="10" rx="3" fill="#CBD5E1"/>
  <rect x="250" y="195" width="60" height="8" rx="2" fill="#94A3B8"/>
  
  <rect x="210" y="200" width="30" height="20" rx="4" fill="#E2E8F0"/>
  <rect x="250" y="205" width="100" height="10" rx="3" fill="#CBD5E1"/>
  <rect x="250" y="220" width="60" height="8" rx="2" fill="#94A3B8"/>
  
  <rect x="210" y="225" width="30" height="20" rx="4" fill="#E2E8F0"/>
  <rect x="250" y="230" width="100" height="10" rx="3" fill="#CBD5E1"/>
  <rect x="250" y="245" width="60" height="8" rx="2" fill="#94A3B8"/>
</svg>
